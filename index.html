<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fiches Web — Glossaire collaboratif</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ── RESET & BASE ─────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Nunito', sans-serif;
  background: #F4F6FB;
  color: #1E2235;
  min-height: 100vh;
}

/* ── COULEURS PAR OUTIL ───────────────────────────────────────────────────── */
:root {
  --html-c: #E8622A;  --html-bg: #FFF0EB;  --html-br: #FBBFA6;
  --css-c:  #2A6FE8;  --css-bg:  #EBF0FF;  --css-br:  #A6BFFB;
  --js-c:   #D4A800;  --js-bg:   #FFF9E0;  --js-br:   #F5DC7A;
  --bs-c:   #7B3FE4;  --bs-bg:   #F3EEFF;  --bs-br:   #C9ACFB;
  --mk-c:   #0F8A60;  --mk-bg:   #E6F7F1;  --mk-br:   #80D4B4;
  --gl-c:   #C2460B;  --gl-bg:   #FFF2EB;  --gl-br:   #F5B48A;
}

/* ── TOPBAR ───────────────────────────────────────────────────────────────── */
.topbar {
  background: #fff;
  border-bottom: 2px solid #EAECF5;
  padding: 0 32px;
  display: flex;
  align-items: center;
  gap: 24px;
  position: sticky;
  top: 0;
  z-index: 50;
  height: 64px;
}
.topbar-logo {
  font-size: 17px;
  font-weight: 800;
  color: #1E2235;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 8px;
}
.topbar-logo .dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: linear-gradient(135deg, #2A6FE8, #7B3FE4);
}
.topbar-sep { width: 1px; height: 28px; background: #EAECF5; flex-shrink: 0; }

.filters {
  display: flex;
  gap: 6px;
  align-items: center;
  flex-wrap: nowrap;
  overflow-x: auto;
  scrollbar-width: none;
}
.filters::-webkit-scrollbar { display: none; }

.filter-btn {
  padding: 6px 14px;
  border-radius: 20px;
  border: 2px solid transparent;
  background: #F4F6FB;
  color: #6B7090;
  font-family: 'Nunito', sans-serif;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  white-space: nowrap;
  transition: all .15s;
  display: flex;
  align-items: center;
  gap: 6px;
}
.filter-btn .chip-icon { font-size: 14px; }
.filter-btn:hover { background: #EAECF5; color: #1E2235; }
.filter-btn.active { background: #1E2235; color: #fff; border-color: #1E2235; }
.filter-btn.active.f-html { background: var(--html-c); border-color: var(--html-c); }
.filter-btn.active.f-css  { background: var(--css-c);  border-color: var(--css-c); }
.filter-btn.active.f-js   { background: var(--js-c);   border-color: var(--js-c); color: #1E2235; }
.filter-btn.active.f-bs   { background: var(--bs-c);   border-color: var(--bs-c); }
.filter-btn.active.f-mk   { background: var(--mk-c);   border-color: var(--mk-c); }
.filter-btn.active.f-gl   { background: var(--gl-c);   border-color: var(--gl-c); }

.topbar-right {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}
.search-box {
  display: flex;
  align-items: center;
  gap: 8px;
  background: #F4F6FB;
  border: 2px solid #EAECF5;
  border-radius: 12px;
  padding: 0 12px;
  height: 38px;
  transition: border-color .15s;
}
.search-box:focus-within { border-color: #2A6FE8; }
.search-box input {
  border: none;
  background: transparent;
  font-family: 'Nunito', sans-serif;
  font-size: 13px;
  color: #1E2235;
  outline: none;
  width: 160px;
}
.search-box input::placeholder { color: #9EA4C0; }

.add-card-btn {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 8px 16px;
  background: #2A6FE8;
  color: #fff;
  border: none;
  border-radius: 12px;
  font-family: 'Nunito', sans-serif;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  transition: background .15s, transform .1s;
  white-space: nowrap;
}
.add-card-btn:hover { background: #1A5FD8; }
.add-card-btn:active { transform: scale(.97); }
.add-card-btn .plus { font-size: 18px; font-weight: 400; line-height: 1; }

/* ── HERO ─────────────────────────────────────────────────────────────────── */
.hero {
  padding: 40px 32px 24px;
  max-width: 1180px;
  margin: 0 auto;
}
.hero h1 {
  font-size: clamp(22px, 3vw, 30px);
  font-weight: 800;
  color: #1E2235;
  margin-bottom: 6px;
}
.hero p { font-size: 15px; color: #6B7090; font-weight: 500; }
.hero strong { color: #1E2235; }

/* ── GRID ─────────────────────────────────────────────────────────────────── */
.grid {
  max-width: 1180px;
  margin: 0 auto;
  padding: 0 32px 64px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 20px;
}

/* ── CARD ─────────────────────────────────────────────────────────────────── */
.card {
  background: #fff;
  border-radius: 20px;
  border: 2px solid #EAECF5;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  transition: transform .18s, box-shadow .18s, border-color .18s;
}
.card:hover {
  transform: translateY(-4px);
  box-shadow: 0 12px 32px rgba(30,34,53,.09);
  border-color: #D4D8EC;
}

/* bandeau couleur haut */
.card-stripe {
  height: 6px;
  width: 100%;
}
.card[data-cat="html"] .card-stripe { background: var(--html-c); }
.card[data-cat="css"]  .card-stripe { background: var(--css-c); }
.card[data-cat="js"]   .card-stripe { background: var(--js-c); }
.card[data-cat="bootstrap"] .card-stripe { background: var(--bs-c); }
.card[data-cat="mkdocs"]    .card-stripe { background: var(--mk-c); }
.card[data-cat="gitlab"]    .card-stripe { background: var(--gl-c); }

.card-head {
  padding: 20px 22px 16px;
  display: flex;
  align-items: flex-start;
  gap: 14px;
}
.card-icon {
  width: 52px; height: 52px;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  flex-shrink: 0;
}
.card[data-cat="html"]      .card-icon { background: var(--html-bg); }
.card[data-cat="css"]       .card-icon { background: var(--css-bg); }
.card[data-cat="js"]        .card-icon { background: var(--js-bg); }
.card[data-cat="bootstrap"] .card-icon { background: var(--bs-bg); }
.card[data-cat="mkdocs"]    .card-icon { background: var(--mk-bg); }
.card[data-cat="gitlab"]    .card-icon { background: var(--gl-bg); }

.card-head-text { flex: 1; min-width: 0; }

.card-badge {
  display: inline-flex;
  align-items: center;
  padding: 2px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .05em;
  margin-bottom: 6px;
}
.card[data-cat="html"]      .card-badge { background: var(--html-bg); color: var(--html-c); }
.card[data-cat="css"]       .card-badge { background: var(--css-bg);  color: var(--css-c); }
.card[data-cat="js"]        .card-badge { background: var(--js-bg);   color: var(--js-c); }
.card[data-cat="bootstrap"] .card-badge { background: var(--bs-bg);   color: var(--bs-c); }
.card[data-cat="mkdocs"]    .card-badge { background: var(--mk-bg);   color: var(--mk-c); }
.card[data-cat="gitlab"]    .card-badge { background: var(--gl-bg);   color: var(--gl-c); }

.card h2 {
  font-size: 17px;
  font-weight: 800;
  color: #1E2235;
  line-height: 1.2;
  margin-bottom: 2px;
}
.card .card-sub {
  font-size: 12px;
  color: #9EA4C0;
  font-weight: 600;
}

/* définition */
.card-def {
  padding: 0 22px 14px;
  font-size: 13.5px;
  color: #4A5070;
  line-height: 1.65;
  font-weight: 500;
}

/* métaphore */
.card-metaphore {
  margin: 0 22px 16px;
  background: #F4F6FB;
  border-radius: 12px;
  padding: 10px 14px;
  font-size: 13px;
  color: #6B7090;
  font-weight: 600;
  line-height: 1.55;
}

/* exemple de code */
.card-code {
  margin: 0 22px 18px;
  background: #1E2235;
  border-radius: 12px;
  overflow: hidden;
}
.card-code-header {
  padding: 8px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  border-bottom: 1px solid rgba(255,255,255,.06);
}
.mac-dots { display: flex; gap: 5px; }
.mac-dots span {
  width: 9px; height: 9px; border-radius: 50%;
}
.mac-dots span:nth-child(1) { background: #FF5F56; }
.mac-dots span:nth-child(2) { background: #FFBD2E; }
.mac-dots span:nth-child(3) { background: #27C93F; }
.code-filename {
  font-size: 11px;
  color: rgba(255,255,255,.35);
  font-weight: 600;
  letter-spacing: .04em;
}
.card-code pre {
  padding: 14px 16px;
  font-family: 'Courier New', monospace;
  font-size: 12px;
  line-height: 1.75;
  color: #C9D1E8;
  overflow-x: auto;
  white-space: pre;
}
/* syntax */
.kw  { color: #c792ea; }
.str { color: #c3e88d; }
.fn  { color: #82aaff; }
.cm  { color: #546e94; font-style: italic; }
.tg  { color: #f07178; }
.at  { color: #ffcb6b; }
.vl  { color: #c3e88d; }
.sl  { color: #89ddff; }
.pr  { color: #82aaff; }
.pu  { color: #c792ea; }
.nm  { color: #f78c6c; }

/* ── SECTIONS CONTRIB ─────────────────────────────────────────────────────── */
.card-contrib {
  border-top: 2px solid #F4F6FB;
  margin-top: auto;
}
.contrib-block {
  padding: 14px 22px;
  border-bottom: 2px solid #F4F6FB;
}
.contrib-block:last-child { border-bottom: none; }

.contrib-title {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}
.contrib-label {
  font-size: 11px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: #9EA4C0;
  display: flex;
  align-items: center;
  gap: 6px;
}
.contrib-count {
  background: #F4F6FB;
  color: #6B7090;
  font-size: 10px;
  font-weight: 700;
  padding: 1px 8px;
  border-radius: 8px;
}
.plus-btn {
  width: 28px; height: 28px;
  border-radius: 9px;
  border: 2px solid #EAECF5;
  background: #fff;
  color: #6B7090;
  font-size: 18px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Nunito', sans-serif;
  transition: all .15s;
  line-height: 1;
}
.plus-btn:hover { background: #F4F6FB; color: #1E2235; border-color: #D4D8EC; }

.contrib-items { display: flex; flex-direction: column; gap: 7px; }
.contrib-item {
  background: #F4F6FB;
  border-radius: 10px;
  padding: 9px 12px;
  font-size: 13px;
  color: #4A5070;
  font-weight: 500;
  line-height: 1.5;
}
.contrib-item a { color: #2A6FE8; text-decoration: none; font-weight: 600; }
.contrib-item a:hover { text-decoration: underline; }
.contrib-item .contrib-author {
  font-size: 11px;
  color: #9EA4C0;
  font-weight: 700;
  margin-top: 3px;
}
.contrib-empty {
  font-size: 12.5px;
  color: #B8BEDD;
  font-weight: 600;
  font-style: italic;
  padding: 2px 0;
}

/* ── MODAL ────────────────────────────────────────────────────────────────── */
.overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(30,34,53,.45);
  z-index: 100;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.overlay.open { display: flex; }

.modal {
  background: #fff;
  border-radius: 24px;
  padding: 28px;
  width: 100%;
  max-width: 480px;
  box-shadow: 0 24px 64px rgba(30,34,53,.18);
}
.modal-head {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 22px;
}
.modal-head h3 {
  font-size: 18px;
  font-weight: 800;
  color: #1E2235;
  line-height: 1.2;
}
.modal-head .modal-sub {
  font-size: 13px;
  color: #9EA4C0;
  font-weight: 600;
  margin-top: 3px;
}
.modal-close {
  width: 32px; height: 32px;
  border-radius: 10px;
  border: 2px solid #EAECF5;
  background: #F4F6FB;
  color: #6B7090;
  font-size: 18px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: all .15s;
  font-family: 'Nunito', sans-serif;
}
.modal-close:hover { background: #EAECF5; color: #1E2235; }

.form-row { margin-bottom: 16px; }
.form-row label {
  display: block;
  font-size: 12px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: #6B7090;
  margin-bottom: 7px;
}
.form-row input,
.form-row textarea,
.form-row select {
  width: 100%;
  border: 2px solid #EAECF5;
  border-radius: 12px;
  background: #F4F6FB;
  font-family: 'Nunito', sans-serif;
  font-size: 14px;
  font-weight: 500;
  color: #1E2235;
  padding: 10px 14px;
  outline: none;
  transition: border-color .15s, background .15s;
}
.form-row input:focus,
.form-row textarea:focus,
.form-row select:focus { border-color: #2A6FE8; background: #fff; }
.form-row input::placeholder,
.form-row textarea::placeholder { color: #B8BEDD; }
.form-row textarea { height: 90px; resize: vertical; }

/* segmented type selector */
.type-toggle {
  display: flex;
  gap: 8px;
}
.type-toggle button {
  flex: 1;
  padding: 9px;
  border-radius: 10px;
  border: 2px solid #EAECF5;
  background: #F4F6FB;
  color: #6B7090;
  font-family: 'Nunito', sans-serif;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  transition: all .15s;
}
.type-toggle button.sel { background: #1E2235; color: #fff; border-color: #1E2235; }

.modal-footer {
  display: flex;
  gap: 10px;
  justify-content: flex-end;
  margin-top: 20px;
}
.btn-cancel {
  padding: 10px 20px;
  border-radius: 12px;
  border: 2px solid #EAECF5;
  background: #F4F6FB;
  color: #6B7090;
  font-family: 'Nunito', sans-serif;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: all .15s;
}
.btn-cancel:hover { background: #EAECF5; }
.btn-ok {
  padding: 10px 24px;
  border-radius: 12px;
  border: none;
  background: #2A6FE8;
  color: #fff;
  font-family: 'Nunito', sans-serif;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: background .15s, transform .1s;
}
.btn-ok:hover { background: #1A5FD8; }
.btn-ok:active { transform: scale(.97); }

/* modal "nouvelle fiche" spécifique */
.cat-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}
.cat-opt {
  padding: 10px 8px;
  border-radius: 12px;
  border: 2px solid #EAECF5;
  background: #F4F6FB;
  color: #6B7090;
  font-family: 'Nunito', sans-serif;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  text-align: center;
  transition: all .15s;
}
.cat-opt:hover { border-color: #D4D8EC; background: #EAECF5; }
.cat-opt.sel { border-color: #2A6FE8; background: #EBF0FF; color: #2A6FE8; }

/* ── TOAST ────────────────────────────────────────────────────────────────── */
#toast {
  position: fixed;
  bottom: 28px; right: 28px;
  background: #1E2235;
  color: #fff;
  padding: 12px 20px;
  border-radius: 14px;
  font-size: 14px;
  font-weight: 700;
  opacity: 0;
  transform: translateY(10px);
  transition: all .22s;
  pointer-events: none;
  z-index: 200;
  box-shadow: 0 8px 24px rgba(30,34,53,.25);
}
#toast.show { opacity: 1; transform: translateY(0); }

/* ── EMPTY ────────────────────────────────────────────────────────────────── */
.empty {
  grid-column: 1/-1;
  text-align: center;
  padding: 80px 20px;
  color: #B8BEDD;
  font-size: 15px;
  font-weight: 600;
}

/* ── RESPONSIVE ───────────────────────────────────────────────────────────── */
@media (max-width: 640px) {
  .topbar { padding: 0 16px; gap: 12px; }
  .hero, .grid { padding-left: 16px; padding-right: 16px; }
  .grid { grid-template-columns: 1fr; }
  .search-box input { width: 110px; }
  .add-card-btn span { display: none; }
}
</style>
</head>
<body>

<!-- ── TOPBAR ─────────────────────────────────────────────────────────────── -->
<nav class="topbar">
  <div class="topbar-logo">
    <div class="dot"></div>
    Fiches Web
  </div>
  <div class="topbar-sep"></div>
  <div class="filters">
    <button class="filter-btn active" data-f="all"       onclick="setFilter('all',this)">Tout</button>
    <button class="filter-btn f-html" data-f="html"      onclick="setFilter('html',this)"><span class="chip-icon">🧱</span> HTML</button>
    <button class="filter-btn f-css"  data-f="css"       onclick="setFilter('css',this)"><span class="chip-icon">🎨</span> CSS</button>
    <button class="filter-btn f-js"   data-f="js"        onclick="setFilter('js',this)"><span class="chip-icon">⚡</span> JavaScript</button>
    <button class="filter-btn f-bs"   data-f="bootstrap" onclick="setFilter('bootstrap',this)"><span class="chip-icon">🧩</span> Bootstrap</button>
    <button class="filter-btn f-mk"   data-f="mkdocs"    onclick="setFilter('mkdocs',this)"><span class="chip-icon">📄</span> MkDocs</button>
    <button class="filter-btn f-gl"   data-f="gitlab"    onclick="setFilter('gitlab',this)"><span class="chip-icon">🦊</span> GitLab</button>
  </div>
  <div class="topbar-right">
    <div class="search-box">
      <svg width="14" height="14" fill="none" stroke="#9EA4C0" stroke-width="2.5" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="search" type="text" placeholder="Chercher…" oninput="render()">
    </div>
    <button class="add-card-btn" onclick="openNewCard()">
      <span class="plus">+</span>
      <span>Nouvelle fiche</span>
    </button>
  </div>
</nav>

<!-- ── HERO ───────────────────────────────────────────────────────────────── -->
<div class="hero">
  <h1>Les outils du web, expliqués simplement ✌️</h1>
  <p>Des fiches claires pour apprendre à ton rythme. <strong>Clique sur +</strong> pour ajouter des exemples ou des ressources à n'importe quelle fiche.</p>
</div>

<!-- ── GRID ───────────────────────────────────────────────────────────────── -->
<div class="grid" id="grid"></div>

<!-- ── MODAL CONTRIB ──────────────────────────────────────────────────────── -->
<div class="overlay" id="ov-contrib">
  <div class="modal">
    <div class="modal-head">
      <div>
        <h3 id="mc-title">Ajouter</h3>
        <div class="modal-sub" id="mc-sub"></div>
      </div>
      <button class="modal-close" onclick="closeModal('ov-contrib')">×</button>
    </div>

    <div class="form-row">
      <label>Type de contribution</label>
      <div class="type-toggle">
        <button id="tt-ex"  class="sel" onclick="setType('exemple')">💡 Exemple</button>
        <button id="tt-res" class=""    onclick="setType('ressource')">🔗 Ressource</button>
      </div>
    </div>
    <div class="form-row">
      <label>Ton prénom *</label>
      <input id="mc-author" placeholder="ex : Camille" />
    </div>
    <div class="form-row">
      <label id="mc-content-label">Contenu *</label>
      <textarea id="mc-content" placeholder=""></textarea>
    </div>
    <div class="form-row" id="mc-url-row" style="display:none">
      <label>Lien URL</label>
      <input id="mc-url" placeholder="https://…" />
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal('ov-contrib')">Annuler</button>
      <button class="btn-ok" onclick="submitContrib()">Ajouter →</button>
    </div>
  </div>
</div>

<!-- ── MODAL NOUVELLE FICHE ───────────────────────────────────────────────── -->
<div class="overlay" id="ov-new">
  <div class="modal">
    <div class="modal-head">
      <div>
        <h3>Nouvelle fiche</h3>
        <div class="modal-sub">Crée une fiche pour ta classe</div>
      </div>
      <button class="modal-close" onclick="closeModal('ov-new')">×</button>
    </div>

    <div class="form-row">
      <label>Catégorie</label>
      <div class="cat-grid" id="cat-grid">
        <button class="cat-opt sel" data-cat="html"      onclick="selCat(this)">🧱 HTML</button>
        <button class="cat-opt"     data-cat="css"       onclick="selCat(this)">🎨 CSS</button>
        <button class="cat-opt"     data-cat="js"        onclick="selCat(this)">⚡ JS</button>
        <button class="cat-opt"     data-cat="bootstrap" onclick="selCat(this)">🧩 Bootstrap</button>
        <button class="cat-opt"     data-cat="mkdocs"    onclick="selCat(this)">📄 MkDocs</button>
        <button class="cat-opt"     data-cat="gitlab"    onclick="selCat(this)">🦊 GitLab</button>
      </div>
    </div>
    <div class="form-row">
      <label>Titre de la fiche *</label>
      <input id="nf-titre" placeholder="ex : Les variables CSS" />
    </div>
    <div class="form-row">
      <label>Sous-titre (une ligne)</label>
      <input id="nf-sub" placeholder="ex : Stocker des valeurs réutilisables" />
    </div>
    <div class="form-row">
      <label>Définition *</label>
      <textarea id="nf-def" placeholder="Explique ce concept simplement…"></textarea>
    </div>
    <div class="form-row">
      <label>Métaphore (optionnel)</label>
      <input id="nf-meta" placeholder="ex : 🍕 C'est comme une recette…" />
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal('ov-new')">Annuler</button>
      <button class="btn-ok" onclick="submitNewCard()">Créer la fiche →</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ─── DONNÉES ─────────────────────────────────────────────────────────────────
const CAT_META = {
  html:      { icon:'🧱', label:'HTML' },
  css:       { icon:'🎨', label:'CSS' },
  js:        { icon:'⚡', label:'JavaScript' },
  bootstrap: { icon:'🧩', label:'Bootstrap' },
  mkdocs:    { icon:'📄', label:'MkDocs' },
  gitlab:    { icon:'🦊', label:'GitLab' },
};

let CARDS = [
  {
    id:'html-1', cat:'html',
    titre:'HTML',
    sub:'La structure de la page',
    def:'HTML (HyperText Markup Language) est le squelette de toute page web. Il organise le contenu avec des balises : titres, paragraphes, images, liens… Le navigateur lit ces balises et affiche le résultat.',
    meta:'🏗️ C\'est comme les murs d\'une maison. Sans eux, rien ne tient debout — mais ils ne disent pas encore la couleur de la peinture.',
    code:{ file:'index.html', content:`<span class="tg">&lt;h1&gt;</span>Mon titre<span class="tg">&lt;/h1&gt;</span>
<span class="tg">&lt;p&gt;</span>Un paragraphe de texte.<span class="tg">&lt;/p&gt;</span>
<span class="tg">&lt;img</span> <span class="at">src=</span><span class="vl">"photo.jpg"</span> <span class="at">alt=</span><span class="vl">"Description"</span><span class="tg">&gt;</span>
<span class="tg">&lt;a</span> <span class="at">href=</span><span class="vl">"https://..."</span><span class="tg">&gt;</span>Un lien<span class="tg">&lt;/a&gt;</span>` },
    exemples:[], ressources:[]
  },
  {
    id:'css-1', cat:'css',
    titre:'CSS',
    sub:'Le style de la page',
    def:'CSS (Cascading Style Sheets) s\'occupe de l\'apparence. Il définit les couleurs, polices, tailles, espacements et mises en page. Sans CSS, toutes les pages web seraient du texte noir sur fond blanc.',
    meta:'🎨 Si HTML est la maison, CSS c\'est la déco — les couleurs des murs, les meubles, la lumière.',
    code:{ file:'style.css', content:`<span class="sl">h1</span> {
  <span class="pr">color</span>: <span class="vl">#2A6FE8</span>;
  <span class="pr">font-size</span>: <span class="vl">32px</span>;
}
<span class="sl">.carte</span> {
  <span class="pr">background</span>: <span class="vl">#fff</span>;
  <span class="pr">border-radius</span>: <span class="vl">16px</span>;
  <span class="pr">padding</span>: <span class="vl">20px</span>;
}` },
    exemples:[], ressources:[]
  },
  {
    id:'css-2', cat:'css',
    titre:'Media queries',
    sub:'S\'adapter à la taille de l\'écran',
    def:'Les media queries permettent d\'appliquer des styles différents selon la taille de l\'écran. Grâce à elles, un site peut s\'afficher en une colonne sur mobile et en 3 colonnes sur ordinateur.',
    meta:'👗 C\'est comme des vêtements taille S/M/L — le même contenu, mais un "costume" différent selon l\'écran.',
    code:{ file:'responsive.css', content:`<span class="cm">/* Sur mobile (moins de 768px) */</span>
<span class="kw">@media</span> (<span class="pr">max-width</span>: <span class="vl">768px</span>) {
  <span class="sl">.menu</span> { <span class="pr">display</span>: <span class="vl">none</span>; }
  <span class="sl">h1</span>    { <span class="pr">font-size</span>: <span class="vl">20px</span>; }
}` },
    exemples:[], ressources:[]
  },
  {
    id:'js-1', cat:'js',
    titre:'JavaScript',
    sub:'L\'interactivité de la page',
    def:'JavaScript (JS) rend les pages web vivantes. Il peut réagir aux clics, modifier le contenu affiché, faire des animations, ou envoyer des données sans recharger la page.',
    meta:'⚡ HTML est le squelette, CSS l\'apparence, JS le système nerveux. C\'est ce qui fait que la lampe s\'allume quand tu appuies sur l\'interrupteur.',
    code:{ file:'script.js', content:`<span class="cm">// Au clic sur le bouton</span>
<span class="kw">const</span> btn = document.<span class="fn">querySelector</span>(<span class="str">'#bouton'</span>);

btn.<span class="fn">addEventListener</span>(<span class="str">'click'</span>, () => {
  btn.textContent = <span class="str">'Cliqué !'</span>;
  btn.style.background = <span class="str">'#2A6FE8'</span>;
});` },
    exemples:[], ressources:[]
  },
  {
    id:'bs-1', cat:'bootstrap',
    titre:'Bootstrap',
    sub:'Des composants prêts à l\'emploi',
    def:'Bootstrap est une boîte à outils CSS/HTML créée par Twitter. En ajoutant des classes prédéfinies dans ton HTML, tu obtiens des boutons, grilles, menus et formulaires déjà stylisés et responsive — sans coder le CSS toi-même.',
    meta:'🧱 C\'est comme des briques Lego — les pièces existent déjà, tu assembles sans tout fabriquer.',
    code:{ file:'index.html', content:`<span class="cm">&lt;!-- Un bouton Bootstrap --&gt;</span>
<span class="tg">&lt;button</span> <span class="at">class=</span><span class="vl">"btn btn-primary"</span><span class="tg">&gt;</span>
  Envoyer
<span class="tg">&lt;/button&gt;</span>

<span class="cm">&lt;!-- Grille 2 colonnes --&gt;</span>
<span class="tg">&lt;div</span> <span class="at">class=</span><span class="vl">"row"</span><span class="tg">&gt;</span>
  <span class="tg">&lt;div</span> <span class="at">class=</span><span class="vl">"col-md-6"</span><span class="tg">&gt;</span>Gauche<span class="tg">&lt;/div&gt;</span>
  <span class="tg">&lt;div</span> <span class="at">class=</span><span class="vl">"col-md-6"</span><span class="tg">&gt;</span>Droite<span class="tg">&lt;/div&gt;</span>
<span class="tg">&lt;/div&gt;</span>` },
    exemples:[], ressources:[]
  },
  {
    id:'mk-1', cat:'mkdocs',
    titre:'MkDocs',
    sub:'Du texte → un site web',
    def:'MkDocs est un générateur de site de documentation. Tu écris du texte simple en Markdown (# Titre, **gras**, - liste), et MkDocs le transforme automatiquement en un site web propre et navigable. Pas besoin de toucher au HTML.',
    meta:'📝 C\'est comme écrire sur Word et qu\'un robot transforme ton document en site web automatiquement.',
    code:{ file:'terminal', content:`<span class="cm"># Installer MkDocs</span>
pip install mkdocs

<span class="cm"># Créer un projet</span>
mkdocs new mon-projet

<span class="cm"># Lancer en local</span>
mkdocs serve

<span class="cm"># Générer le site final</span>
mkdocs build` },
    exemples:[], ressources:[]
  },
  {
    id:'gl-1', cat:'gitlab',
    titre:'GitLab',
    sub:'Stocker et partager son code',
    def:'GitLab est une plateforme en ligne pour stocker, versionner et partager du code. Basé sur Git, il permet à plusieurs personnes de travailler sur le même projet sans s\'écraser mutuellement, grâce à un historique de toutes les modifications.',
    meta:'📁 C\'est Google Drive pour le code — mais en plus intelligent, car il se souvient de chaque version de chaque fichier.',
    code:{ file:'terminal', content:`<span class="cm"># Copier un projet GitLab sur ton ordi</span>
git clone https://gitlab.com/projet

<span class="cm"># Préparer ses modifications</span>
git add .

<span class="cm"># Sauvegarder avec un message</span>
git commit -m <span class="str">"Ajout de la page contact"</span>

<span class="cm"># Envoyer sur GitLab</span>
git push` },
    exemples:[], ressources:[]
  },
];

// ─── STATE ────────────────────────────────────────────────────────────────────
let activeFilter = 'all';
let pendingContrib = null;
let pendingType = 'exemple';
let selectedCat = 'html';

// persistance localStorage
function load() {
  try {
    const saved = JSON.parse(localStorage.getItem('fiches_contribs') || '{}');
    const extra = JSON.parse(localStorage.getItem('fiches_extra') || '[]');
    CARDS.forEach(c => {
      if (saved[c.id]) { c.exemples = saved[c.id].ex||[]; c.ressources = saved[c.id].res||[]; }
    });
    CARDS = CARDS.concat(extra);
  } catch(e){}
}
function save() {
  const out = {};
  CARDS.forEach(c => { out[c.id] = { ex: c.exemples, res: c.ressources }; });
  localStorage.setItem('fiches_contribs', JSON.stringify(out));
}
function saveExtra() {
  const base = ['html-1','css-1','css-2','js-1','bs-1','mk-1','gl-1'];
  const extra = CARDS.filter(c => !base.includes(c.id));
  localStorage.setItem('fiches_extra', JSON.stringify(extra));
}

// ─── FILTER ───────────────────────────────────────────────────────────────────
function setFilter(f, btn) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render() {
  const q = (document.getElementById('search').value || '').toLowerCase();
  let cards = CARDS;
  if (activeFilter !== 'all') cards = cards.filter(c => c.cat === activeFilter);
  if (q) cards = cards.filter(c =>
    c.titre.toLowerCase().includes(q) ||
    c.def.toLowerCase().includes(q) ||
    (c.sub||'').toLowerCase().includes(q)
  );

  const grid = document.getElementById('grid');
  if (!cards.length) {
    grid.innerHTML = '<div class="empty">Aucune fiche trouvée 😕</div>';
    return;
  }

  grid.innerHTML = cards.map(c => {
    const m = CAT_META[c.cat] || { icon:'📌', label: c.cat };
    const hasCode = c.code && c.code.content;
    return `
<div class="card" data-cat="${c.cat}">
  <div class="card-stripe"></div>
  <div class="card-head">
    <div class="card-icon">${m.icon}</div>
    <div class="card-head-text">
      <span class="card-badge">${m.label}</span>
      <h2>${esc(c.titre)}</h2>
      ${c.sub ? `<p class="card-sub">${esc(c.sub)}</p>` : ''}
    </div>
  </div>

  <p class="card-def">${esc(c.def)}</p>
  ${c.meta ? `<div class="card-metaphore">${esc(c.meta)}</div>` : ''}

  ${hasCode ? `
  <div class="card-code">
    <div class="card-code-header">
      <div class="mac-dots"><span></span><span></span><span></span></div>
      <span class="code-filename">${esc(c.code.file)}</span>
    </div>
    <pre>${c.code.content}</pre>
  </div>` : ''}

  <div class="card-contrib">
    <div class="contrib-block">
      <div class="contrib-title">
        <span class="contrib-label">
          💡 Exemples
          <span class="contrib-count">${c.exemples.length}</span>
        </span>
        <button class="plus-btn" onclick="openContrib('${c.id}','${esc(c.titre)}','exemple')" title="Ajouter un exemple">+</button>
      </div>
      <div class="contrib-items">
        ${c.exemples.length
          ? c.exemples.map(e=>`<div class="contrib-item">${esc(e.texte)}<div class="contrib-author">— ${esc(e.auteur)}</div></div>`).join('')
          : '<p class="contrib-empty">Pas encore d\'exemple — sois le premier !</p>'}
      </div>
    </div>
    <div class="contrib-block">
      <div class="contrib-title">
        <span class="contrib-label">
          🔗 Ressources
          <span class="contrib-count">${c.ressources.length}</span>
        </span>
        <button class="plus-btn" onclick="openContrib('${c.id}','${esc(c.titre)}','ressource')" title="Ajouter une ressource">+</button>
      </div>
      <div class="contrib-items">
        ${c.ressources.length
          ? c.ressources.map(r=>`<div class="contrib-item">${r.url ? `<a href="${esc(r.url)}" target="_blank">🔗 ${esc(r.titre)}</a>` : esc(r.titre)}<div class="contrib-author">— ${esc(r.auteur)}</div></div>`).join('')
          : '<p class="contrib-empty">Aucune ressource — ajoute la première !</p>'}
      </div>
    </div>
  </div>
</div>`;
  }).join('');
}

function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

// ─── MODAL CONTRIB ────────────────────────────────────────────────────────────
function openContrib(id, nom, type) {
  pendingContrib = { id, nom };
  pendingType = type;
  document.getElementById('mc-title').textContent = type === 'exemple' ? 'Ajouter un exemple' : 'Ajouter une ressource';
  document.getElementById('mc-sub').textContent = '→ ' + nom;
  setType(type);
  document.getElementById('mc-author').value = localStorage.getItem('fiches_author') || '';
  document.getElementById('mc-content').value = '';
  document.getElementById('mc-url').value = '';
  document.getElementById('ov-contrib').classList.add('open');
}

function setType(t) {
  pendingType = t;
  document.getElementById('tt-ex').className  = t==='exemple'   ? 'sel' : '';
  document.getElementById('tt-res').className = t==='ressource' ? 'sel' : '';
  document.getElementById('mc-content-label').textContent = t==='exemple' ? 'Contenu *' : 'Titre / description *';
  document.getElementById('mc-content').placeholder = t==='exemple'
    ? 'ex : display: flex; justify-content: center;'
    : 'ex : Grafikart — CSS Flexbox en 10 min';
  document.getElementById('mc-url-row').style.display = t==='ressource' ? 'block' : 'none';
}

function submitContrib() {
  const author  = document.getElementById('mc-author').value.trim();
  const content = document.getElementById('mc-content').value.trim();
  const url     = document.getElementById('mc-url').value.trim();
  if (!author || !content) { toast('⚠️ Remplis ton prénom et le contenu.'); return; }
  localStorage.setItem('fiches_author', author);
  const card = CARDS.find(c => c.id === pendingContrib.id);
  if (!card) return;
  if (pendingType === 'exemple') card.exemples.push({ auteur: author, texte: content });
  else card.ressources.push({ auteur: author, titre: content, url });
  save();
  closeModal('ov-contrib');
  render();
  toast('✅ Contribution ajoutée !');
}

// ─── MODAL NOUVELLE FICHE ────────────────────────────────────────────────────
function openNewCard() {
  selectedCat = 'html';
  document.querySelectorAll('.cat-opt').forEach(b => b.classList.remove('sel'));
  document.querySelector('.cat-opt[data-cat="html"]').classList.add('sel');
  document.getElementById('nf-titre').value = '';
  document.getElementById('nf-sub').value   = '';
  document.getElementById('nf-def').value   = '';
  document.getElementById('nf-meta').value  = '';
  document.getElementById('ov-new').classList.add('open');
}

function selCat(btn) {
  selectedCat = btn.dataset.cat;
  document.querySelectorAll('.cat-opt').forEach(b => b.classList.remove('sel'));
  btn.classList.add('sel');
}

function submitNewCard() {
  const titre = document.getElementById('nf-titre').value.trim();
  const def   = document.getElementById('nf-def').value.trim();
  if (!titre || !def) { toast('⚠️ Titre et définition requis.'); return; }
  const newCard = {
    id: 'custom-' + Date.now(),
    cat: selectedCat,
    titre,
    sub:  document.getElementById('nf-sub').value.trim(),
    def,
    meta: document.getElementById('nf-meta').value.trim(),
    code: null,
    exemples: [],
    ressources: []
  };
  CARDS.push(newCard);
  saveExtra();
  closeModal('ov-new');
  render();
  toast('🎉 Fiche créée !');
}

// ─── UTILS ────────────────────────────────────────────────────────────────────
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

document.getElementById('ov-contrib').addEventListener('click', e => {
  if (e.target === document.getElementById('ov-contrib')) closeModal('ov-contrib');
});
document.getElementById('ov-new').addEventListener('click', e => {
  if (e.target === document.getElementById('ov-new')) closeModal('ov-new');
});

// ─── INIT ─────────────────────────────────────────────────────────────────────
load();
render();
</script>
</body>
</html>
